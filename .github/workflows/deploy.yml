name: Build and deploy

on:
  workflow_dispatch:
    inputs:
      image_namespace:
        description: "Docker image namespace, for example owner or org"
        required: false
        type: string

env:
  NODE_VERSION: "22"
  IMAGE_REGISTRY: ${{ secrets.IMAGE_REGISTRY }}
  IMAGE_NAMESPACE: ${{ inputs.image_namespace || vars.IMAGE_NAMESPACE }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail
          : "${IMAGE_REGISTRY:?Set GitHub secret IMAGE_REGISTRY, for example ghcr.io}"
          : "${IMAGE_NAMESPACE:?Set workflow input image_namespace or GitHub variable IMAGE_NAMESPACE, for example owner}"

          project_name="$(node -p "require('./package.json').name")"
          project_name="${project_name#@}"
          project_name="${project_name/\//-}"
          project_name="$(printf '%s' "${project_name}" | tr '[:upper:]' '[:lower:]')"
          image_version="${GITHUB_REF_NAME##*/}"

          if [[ ! "${image_version}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image version '${image_version}'. Use a branch suffix that is a valid Docker tag." >&2
            exit 1
          fi

          echo "image_ref=${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${project_name}:${image_version}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to image registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Update remote docker compose
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      SAVE_FILE_PATH: ${{ vars.SAVE_FILE_PATH }}
      APP_PORT: ${{ vars.APP_PORT }}
      UPLOAD_MAX_FILE_SIZE: ${{ vars.UPLOAD_MAX_FILE_SIZE }}
      UPLOAD_MAX_FILES: ${{ vars.UPLOAD_MAX_FILES }}
      UPLOAD_ALLOWED_MIME_TYPES: ${{ vars.UPLOAD_ALLOWED_MIME_TYPES }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      IMAGE_REGISTRY_USERNAME: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
      IMAGE_REGISTRY_PASSWORD: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment files
        shell: bash
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set secret SERVER_HOST}"
          : "${SERVER_USER:?Set secret SERVER_USER}"
          : "${SAVE_FILE_PATH:?Set GitHub variable SAVE_FILE_PATH}"
          : "${IMAGE_REGISTRY:?Set GitHub secret IMAGE_REGISTRY, for example ghcr.io}"
          : "${IMAGE_NAMESPACE:?Set workflow input image_namespace or GitHub variable IMAGE_NAMESPACE, for example owner}"

          DEPLOY_PATH="${DEPLOY_PATH:-/opt/file-upload-server}"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_PORT="${APP_PORT:-3000}"
          UPLOAD_MAX_FILE_SIZE="${UPLOAD_MAX_FILE_SIZE:-104857600}"
          UPLOAD_MAX_FILES="${UPLOAD_MAX_FILES:-10}"
          project_name="$(node -p "require('./package.json').name")"
          project_name="${project_name#@}"
          project_name="${project_name/\//-}"
          project_name="$(printf '%s' "${project_name}" | tr '[:upper:]' '[:lower:]')"
          image_version="${GITHUB_REF_NAME##*/}"

          if [[ ! "${image_version}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker image version '${image_version}'. Use a branch suffix that is a valid Docker tag." >&2
            exit 1
          fi

          image_ref="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${project_name}:${image_version}"
          : "${image_ref:?Failed to build Docker image reference}"

          mkdir -p .deploy
          {
            printf 'IMAGE=%s\n' "${image_ref}"
            printf 'PORT=%s\n' "${APP_PORT}"
            printf 'SAVE_FILE_PATH=%s\n' "${SAVE_FILE_PATH}"
            printf 'UPLOAD_MAX_FILE_SIZE=%s\n' "${UPLOAD_MAX_FILE_SIZE}"
            printf 'UPLOAD_MAX_FILES=%s\n' "${UPLOAD_MAX_FILES}"
            printf 'UPLOAD_ALLOWED_MIME_TYPES=%s\n' "${UPLOAD_ALLOWED_MIME_TYPES}"
            printf 'PUBLIC_BASE_URL=%s\n' "${PUBLIC_BASE_URL}"
          } > .deploy/.env

          {
            echo "DEPLOY_PATH=${DEPLOY_PATH}"
            echo "SERVER_PORT=${SERVER_PORT}"
          } >> "$GITHUB_ENV"

      - name: Install SSH password client
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload env file
        shell: bash
        run: |
          set -euo pipefail
          : "${SERVER_PASSWORD:?Set secret SERVER_PASSWORD}"
          export SSHPASS="${SERVER_PASSWORD}"

          remote_dir="$(printf '%q' "${DEPLOY_PATH}")"
          sshpass -e ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" "mkdir -p ${remote_dir}"
          sshpass -e scp -o StrictHostKeyChecking=no -P "${SERVER_PORT}" \
            .deploy/.env \
            "${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/"

      - name: Deploy on remote server
        shell: bash
        run: |
          set -euo pipefail
          : "${SERVER_PASSWORD:?Set secret SERVER_PASSWORD}"
          export SSHPASS="${SERVER_PASSWORD}"

          deploy_path_arg="$(printf '%q' "${DEPLOY_PATH}")"
          registry_arg="$(printf '%q' "${IMAGE_REGISTRY}")"
          registry_user_arg="$(printf '%q' "${IMAGE_REGISTRY_USERNAME}")"
          registry_password_arg="$(printf '%q' "${IMAGE_REGISTRY_PASSWORD}")"
          save_file_path_arg="$(printf '%q' "${SAVE_FILE_PATH}")"

          sshpass -e ssh -o StrictHostKeyChecking=no -p "${SERVER_PORT}" \
            "${SERVER_USER}@${SERVER_HOST}" \
            "bash -s -- ${deploy_path_arg} ${registry_arg} ${registry_user_arg} ${registry_password_arg} ${save_file_path_arg}" <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="$1"
          IMAGE_REGISTRY="$2"
          IMAGE_REGISTRY_USERNAME="$3"
          IMAGE_REGISTRY_PASSWORD="$4"
          SAVE_FILE_PATH="$5"

          cd "${DEPLOY_PATH}"

          mkdir -p "${SAVE_FILE_PATH}"
          chown 1000:1000 "${SAVE_FILE_PATH}" 2>/dev/null || chmod 0777 "${SAVE_FILE_PATH}"

          if [ -n "${IMAGE_REGISTRY_USERNAME}" ] && [ -n "${IMAGE_REGISTRY_PASSWORD}" ]; then
            printf '%s\n' "${IMAGE_REGISTRY_PASSWORD}" | docker login "${IMAGE_REGISTRY}" \
              -u "${IMAGE_REGISTRY_USERNAME}" --password-stdin
          fi

          docker compose --env-file .env -f docker-compose.yaml pull
          docker compose --env-file .env -f docker-compose.yaml up -d --remove-orphans
          docker image prune -f
          REMOTE
