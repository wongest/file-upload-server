services:
  file-upload-server:
    image: ${IMAGE:?IMAGE is required}
    container_name: file-upload-server
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      UPLOAD_DIR: /data/uploads
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-104857600}
      UPLOAD_MAX_FILES: ${UPLOAD_MAX_FILES:-10}
      UPLOAD_ALLOWED_MIME_TYPES: ${UPLOAD_ALLOWED_MIME_TYPES:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - type: bind
        source: ${SAVE_FILE_PATH:?SAVE_FILE_PATH is required}
        target: /data/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
